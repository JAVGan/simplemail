[tox]
envlist = py3, ruff, flake8

[testenv]
deps = pytest
commands = pytest {posargs}

[testenv:ruff]
skip_install = true
deps = ruff
commands = ruff check {posargs:src/ tests/}

[testenv:flake8]
skip_install = true
deps = flake8
commands = flake8 --max-line-length 100 {posargs:src/ tests/}

[testenv:ruff-format]
skip_install = true
deps = ruff
commands = ruff format {posargs:src/ tests/}
